# Default preset. Uploaded to the device as /presets/ via uploadfs.
# Seven horizontal bands (x in [0,1]); preset scale is filled on load (natural minor, root D).
gestures:
  # MIDI note (chromatic / no scale degree)
  - position: [true, 0.0, 0.0, 0.142857, 1.0]
    midi:
      - channel: 1
        note: 60
        octave: 4
        scaleDegree: null
    cv: []
    cv_note: []
    gate: []

  # MIDI note (scale degree: I in preset scale — D natural minor → D4 = MIDI 62)
  - position: [true, 0.142857, 0.0, 0.285714, 1.0]
    midi:
      - channel: 1
        note: 62
        octave: 4
        scaleDegree: 0
    cv: []
    cv_note: []
    gate: []

  # MIDI CC event
  - position: [true, 0.285714, 0.0, 0.428571, 1.0]
    midi:
      - channel: 1
        cc: 1
        axis: y
        bottom: 0
        top: 127
        singleValue: false
    cv: []
    cv_note: []
    gate: []

  # CV mapping (range)
  - position: [true, 0.428571, 0.0, 0.571429, 1.0]
    midi: []
    cv:
      - channel: 1
        axis: y
        bottom: -5.0
        top: 5.0
        singleValue: false
    cv_note: []
    gate: []

  # CV single value
  - position: [true, 0.571429, 0.0, 0.714286, 1.0]
    midi: []
    cv:
      - channel: 1
        axis: y
        bottom: 0.25
        top: 0.25
        singleValue: true
    cv_note: []
    gate: []

  # CV note (chromatic)
  - position: [true, 0.714286, 0.0, 0.857143, 1.0]
    midi: []
    cv:
      - channel: 1
        axis: y
        bottom: 2.0
        top: 2.0
        singleValue: true
    cv_note:
      - cvChannel: 1
        gateChannel: 2
        note: 60
        octave: 4
        scaleDegree: null
    gate:
      - channel: 2
        on: 5
        off: 0

  # CV note (scale degree: I — same pitch as MIDI example; legacy CV matches 1 V/oct)
  - position: [true, 0.857143, 0.0, 1.0, 1.0]
    midi: []
    cv:
      - channel: 1
        axis: y
        bottom: 2.0833333333333335
        top: 2.0833333333333335
        singleValue: true
    cv_note:
      - cvChannel: 1
        gateChannel: 2
        note: 62
        octave: 4
        scaleDegree: 0
    gate:
      - channel: 2
        on: 5
        off: 0
