<span class="h1-actions" x-data="serialStatusView()">
    <button type="button" class="calib-btn" id="calibBtn" x-show="showCalibrate" x-cloak
        x-bind:class="calibButtonClass"
        x-on:click="startCalibration()">
        <span aria-hidden="true">🎯</span>
        <span x-text="calibButtonLabel"></span>
    </button>
    <button type="button" class="record-btn" id="recordBtn" x-show="showRecord" x-cloak
        x-on:click="toggleRecording()">
        ⏺ Record
    </button>
    <button type="button" class="serial-btn" id="serialBtn" x-bind:class="{ connected: serialConnected }"
        x-on:click="toggleSerial()"
        x-text="serialConnected ? '⚡ Disconnect' : '⚡ Connect Serial'">
    </button>
    <button type="button" class="record-btn" x-on:click="reloadFromDevice()">
        <span aria-hidden="true">🔄</span> Reload from device
    </button>
    <button type="button" class="record-btn" x-on:click="saveToDevice()">
        <span aria-hidden="true">📤</span> Save to device
    </button>
    <button type="button" class="record-btn" x-on:click="importFromFile()">
        <span aria-hidden="true">📥</span> Import
    </button>
    <button type="button" class="record-btn" x-on:click="exportToFile()">
        <span aria-hidden="true">💾</span> Export
    </button>
    <button type="button" class="record-btn" title="Download serial traffic from the last 10 minutes (this session)"
        x-on:click="downloadDeviceCommLog()">
        <span aria-hidden="true">📋</span> I/O log
    </button>
    <span class="transfer-status" x-bind:class="{ busy: transferStatusBusy }" x-text="transferStatusText"></span>
</span>
